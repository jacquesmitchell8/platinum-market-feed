[build]
  command = "node scripts/inject-supabase-public.mjs"
  publish = "."

[[redirects]]
  from = "/yahoo-proxy/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "index.html,.env.seed.example,scripts"

[functions]
  directory = "netlify/functions"

[functions."fetch-market-snapshots"]
  schedule = "*/5 * * * *"

[functions."fetch-news"]
  schedule = "0 9,21 * * *"

[functions."ingest-dashboard-cache"]
  schedule = "0 * * * *"
  timeout = 26

[functions."news-digest"]
  timeout = 26

[functions."story-research"]
  timeout = 26

[functions."asset-deep-dive"]
  timeout = 26

[functions."ta-intelligence"]
  timeout = 15

[functions."fetch-producers"]
  schedule = "0 9,21 * * *"

    [functions."propagate-producers"]
  schedule = "15 * * * *"

[functions."fetch-producer-intraday"]
  schedule = "7 * * * *"
  timeout = 26

[functions."propagate-curves"]
  schedule = "0 * * * *"
